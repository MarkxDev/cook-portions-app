<div class="container">
  <div class="card">
    <h1 class="title">Calcolatore Porzioni</h1>
    <p class="subtitle">Calcola il peso della tua porzione da cotto</p>

    <form class="form">
      <div class="input-group">
        <label for="porzione-raw">Peso porzione da crudo (g)</label>
        <input
          id="porzione-raw"
          type="number"
          [(ngModel)]="porzioneRaw"
          name="porzioneRaw"
          placeholder="es. 100"
          min="0"
          step="0.1"
        />
      </div>

      <div class="input-group">
        <label for="totale-raw">Peso totale da crudo (g)</label>
        <input
          id="totale-raw"
          type="number"
          [(ngModel)]="pesoTotaleRaw"
          name="pesoTotaleRaw"
          placeholder="es. 500"
          min="0"
          step="0.1"
        />
      </div>

      <div class="input-group">
        <label for="totale-cooked">Peso totale da cotto (g)</label>
        <input
          id="totale-cooked"
          type="number"
          [(ngModel)]="pesoTotaleCooked"
          name="pesoTotaleCooked"
          placeholder="es. 350"
          min="0"
          step="0.1"
        />
      </div>

      <div class="button-group">
        <button type="button" class="btn btn-primary" (click)="calcolaPorzione()">
          Calcola
        </button>
        <button type="button" class="btn btn-secondary" (click)="reset()">
          Reset
        </button>
      </div>
    </form>

    @if (porzioneCotta() !== null) {
      <div class="result">
        <div class="result-label">Peso porzione da cotto:</div>
        <div class="result-value">{{ porzioneCotta() }} g</div>
      </div>
    }
  </div>
</div>
